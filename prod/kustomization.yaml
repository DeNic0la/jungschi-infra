kind: Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
namespace: jungschi
images:
  - name: jungschi-back
    newName: ghcr.io/denic0la/jungschi-back
    newTag: v2.1.0
  - name: jungschi-ui
    newName: ghcr.io/denic0la/jungschi-ui
    newTag: v2.1.1


resources:
  - ../base
  - ingress.yaml
  - keycloak-realm-sync.yaml
  - sealedsecret_database-config.yaml
  - sealedsecret_keycloak.yaml

configMapGenerator:
  - files:
      - prod-realm.json
    name: keycloak-realm-config
    options:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
  - files:
      - application-prod.yaml
    name: application-config
  - files:
      - nginx.conf
    name: nginx-config


